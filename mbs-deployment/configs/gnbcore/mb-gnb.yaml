gnb_id: 1

cu_cp:
  amf:
    addr: mb-amf.open5gs.org
    port: 38412
    bind_addr: ${GNB_IP}
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
                sd: 1
  inactivity_timer: 7200

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 1
  pci: 1
  slicing:
    - sst: 1
      sd: 1
  pdcch:
    common:
      ss0_index: 0
      coreset0_index: 12
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
  prach:
    prach_config_index: 1
  pdsch:
    mcs_table: qam64
  pusch:
    mcs_table: qam64
    #  sib: # system information block 19 scheduling, SIB19 is the NTN information block
    #    si_window_length: 5
    #    si_sched_info:
    #      - si_period: 16
    #        sib_mapping: 19

ru_sdr:
  device_driver: uhd 
  device_args: type=b200
  srate: 23.04
  tx_gain: 60
  rx_gain: 40

expert_execution:
  threads:
    non_rt:
      nof_non_rt_threads: 2

log:
  filename: stdout
  hex_max_size: 0
  all_level: none
  rlc_level: none

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_with_mbs_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_with_mbs_ngap.pcap
