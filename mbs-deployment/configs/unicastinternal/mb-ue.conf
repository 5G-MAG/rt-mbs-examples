[rf]
freq_offset = 0
tx_gain = 50
rx_gain = 40
srate = 23.04e6
nof_antennas = 1

device_name = zmq
device_args = tx_port=tcp://${UE_IP}:2001,rx_port=tcp://${GNB_IP}:2000,base_srate=23.04e6

[rat.eutra]
dl_earfcn = 0
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106
scs = 15
dl_nr_arfcn = 362000
ssb_nr_arfcn = 361970

[pcap]
enable = MAC,MAC_NR,NAS
mac_filename = /tmp/ue_mac.pcap
mac_nr_filename = /tmp/ue_mac_nr.pcap
nas_filename = /tmp/ue_nas.pcap

[log]
all_level = info
phy_lib_level = error
phy_level = error
filename = stdout
all_hex_limit = 32
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc  = e8ed289deba952e4283b54e88e6183ca
k    = 465b5ce8b199b49faa5f0a2ee238a6bc
imsi = 999700000000005
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet
apn_protocol = ipv4

[gw]
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false
