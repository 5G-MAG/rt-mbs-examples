        Following 3GPP TS 29.532 - Release 17.4.0

        - TMGI Allocate Service operation
            
        - TMGI Deallocate Service operation
    children:
      - url: http://{{_['smf_mb_smf_url']}}/nmbsmf-tmgi/v1/tmgi
        name: TMGI Update
        meta:
          id: req_d21c9d3cfd154ca2bc8ab912e7468ff3
          created: 1771856972772
          modified: 1779127820720
          isPrivate: false
          description: ""
          sortKey: -1771856971431
        method: POST
        body:
          mimeType: application/json
          text: '{ "tmgiList": [ {{tmgiAllocated}} ] }'
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          afterResponse: "// Test 1: Check status code 200\r

            insomnia.test(\"Status code is 200\", function () {\r

            \    insomnia.response.to.have.status(200);\r

            });\r

            \r

            // Test 2: Check data types of the refreshed TMGI (response)\r

            const responseData = insomnia.response.json();\r

            insomnia.test(\"Check data types of the response\", () => {\r

            \    insomnia.expect(responseData.tmgiList).to.be.an(\"array\");\r

            \    insomnia.expect(responseData.tmgiList).to.be.empty;\r

            \    insomnia.expect(responseData.expirationTime).to.be.a(\"string\
            \");\r

            });\r

            \r

            // Save the response as variables\r

            insomnia.environment.set(\"tmgiRefreshedExpiration\",
            responseData.expirationTime);\r

            \r

            // Test 3: Check the expiration time\r

            insomnia.test(\"Compare expirationTime between tmgiAllocated and
            tmgiRefreshed\", () => {\r

            \    const tmgiAllocatedExpiration = new
            Date(insomnia.environment.get(\"tmgiAllocatedExpiration\"));\r

            \    const tmgiRefreshedExpiration = new
            Date(insomnia.environment.get(\"tmgiRefreshedExpiration\"));\r

            \r

            \    // Compare expiration times between the allocated TMGI and the
            refreshed TMGI\r

            \    insomnia.expect(tmgiRefreshedExpiration).to.be.above(tmgiAlloc\
            atedExpiration);\r

            });\r\n"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: http://{{_['smf_mb_smf_url']}}/nmbsmf-tmgi/v1/tmgi
        name: TMGI Allocate
        meta:
          id: req_d8b8b4f994f94eefa550bbff7e95c65c
          created: 1771856972772
          modified: 1779127463365
          isPrivate: false
          description: ""
          sortKey: -1771856971432
        method: POST
        body:
          mimeType: application/json
          text: '{ "tmgiNumber": 1 }'
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          afterResponse: "// Test 1: Check status code 200\r

            insomnia.test(\"Status code is 200\", function () {\r

            \    insomnia.response.to.have.status(200);\r

            });\r

            \r

            // Test 2: Check data types of the allocated TMGI (response)\r

            const responseData = insomnia.response.json();\r

            insomnia.test(\"Check data types of the response\", () => {\r

            \    insomnia.expect(responseData.tmgiList).to.be.an(\"array\");\r

            \    insomnia.expect(responseData.tmgiList).to.not.be.empty;\r

            \    insomnia.expect(responseData.expirationTime).to.be.a(\"string\
            \");\r

            });\r

            \r

            // Save the response as variables\r

            insomnia.environment.set(\"tmgiAllocated\",
            JSON.stringify(responseData.tmgiList[0]))\r

            insomnia.environment.set(\"tmgiAllocatedExpiration\",
            responseData.expirationTime)\r\n"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
