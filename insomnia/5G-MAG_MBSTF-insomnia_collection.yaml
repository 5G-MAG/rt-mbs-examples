          isPrivate: false
          description: ""
          sortKey: -1772783564408
        method: POST
        body:
          mimeType: application/json
          text: |
            {
              "mbsSession": {
                "mbsSessionId": {
                  "ssm": {
                    "sourceIpAddr": {
                      "ipv4Addr": "127.0.0.1"
                    },
                    "destIpAddr": {
                      "ipv4Addr": "232.0.0.1"
                    }
                  }
                },
                "tmgiAllocReq": true,
                "serviceType": "MULTICAST",
                "ingressTunAddrReq": true,
                "activityStatus": "ACTIVE",
                "anyUeInd": true
              }
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.2.0
            description: ""
            disabled: false
        scripts:
          afterResponse: >+
            let data;

            try {
             data = insomnia.response.json();
            } catch (e) {
            	console.log(e);
             return;
            }


            const ingressTunAddr = data?.mbsSession?.ingressTunAddr?.[0];


            if (ingressTunAddr?.ipv4Addr) {
             insomnia.environment.set( "ingressTunAddrIP",`${ingressTunAddr.ipv4Addr}`);
            } 


            if (ingressTunAddr?.portNumber != null) {
             insomnia.environment.set(
             "ingressTunAddrPort",`${ingressTunAddr.portNumber}`);
            } 

        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
