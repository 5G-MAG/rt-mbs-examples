      - url: "{{ _.mbsf_base_url }}/nmbsf-mbs-us/v1/mbs-user-services/{{ _.mbsf_base_url
          }}/nmbsmf-mbssession/v1/mbs-sessions"
        name: Create MBS Session with UDP tunnel
        meta:
          id: req_a9aa26af16204b9ebc9f4f7a04a81bd2
          created: 1751561132003
          modified: 1779117240317
          isPrivate: false
          description: ""
          sortKey: -1751563703555
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "mbsSession": {
                "mbsSessionId": {
                  "ssm": {
                    "sourceIpAddr": {
                      "ipv4Addr": "127.0.0.1"
                    },
                    "destIpAddr": {
                      "ipv4Addr": "232.0.0.1"
                    }
                  }
                },
                "tmgiAllocReq": true,
                "serviceType": "MULTICAST",
                "ingressTunAddrReq": true,
                "activityStatus": "ACTIVE",
                "anyUeInd": true
              }
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: MBSF/0.0.1
        scripts:
          afterResponse: >
            const jsonBody = insomnia.response.json();


            insomnia.environment.set("udp_tunnel_address",
            jsonBody.mbsSession.ingressTunAddr[0].ipv4Addr);

            insomnia.environment.set("udp_tunnel_port",
            jsonBody.mbsSession.ingressTunAddr[0].portNumber);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
